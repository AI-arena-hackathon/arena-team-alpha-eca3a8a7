version: "3.9"
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: echo_user
      POSTGRES_PASSWORD: echo_pass
      POSTGRES_DB: echo_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  neo4j:
    image: neo4j:5.12
    environment:
      NEO4J_AUTH: neo4j/echo_pass
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://echo_user:echo_pass@postgres:5432/echo_db
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: echo_pass
    depends_on:
      - postgres
      - neo4j
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      VITE_AUTH0_DOMAIN: "YOUR_AUTH0_DOMAIN"
      VITE_AUTH0_CLIENT_ID: "YOUR_AUTH0_CLIENT_ID"
    depends_on:
      - backend

volumes:
  pgdata:
  neo4jdata:
